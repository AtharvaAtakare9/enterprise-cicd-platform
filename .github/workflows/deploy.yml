name: Deploy Infrastructure & App

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'k8s/**'
      - 'app/**'
      - 'docker/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      ####################################################################
      # DEBUG - REMOVE AFTER ISSUE IS FIXED
      ####################################################################
      - name: Debug deployment files
        run: |
          echo "===== config.env ====="
          cat scripts/config.env

          echo ""
          echo "===== bootstrap-all.sh ====="
          grep -A12 "Creating Terraform state bucket" scripts/bootstrap-all.sh

          echo ""
          echo "===== terraform backend ====="
          head -20 terraform/envs/prod/main.tf
      ####################################################################

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run full bootstrap (infra + deploy + migration)
        working-directory: .
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          chmod +x scripts/bootstrap-all.sh
          ./scripts/bootstrap-all.sh

      - name: Post summary
        if: always()
        run: |
          echo "### Deployment finished" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Review the 'Run full bootstrap' step for:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Terraform output" >> "$GITHUB_STEP_SUMMARY"
          echo "- ArgoCD password" >> "$GITHUB_STEP_SUMMARY"
          echo "- Load Balancer URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database endpoint" >> "$GITHUB_STEP_SUMMARY"
          echo "- JWT secret" >> "$GITHUB_STEP_SUMMARY"