apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: expense-tracker-dev
resources:
  - ../../base
images:
  - name: REPLACE_ME/expense-tracker-backend
    newName: <ECR_REGISTRY>/expense-tracker-backend
    newTag: dev
patches:
  - target:
      kind: Deployment
      name: expense-tracker-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
