apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker-backend
  labels:
    app: expense-tracker-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: expense-tracker-backend
  template:
    metadata:
      labels:
        app: expense-tracker-backend
    spec:
      containers:
        - name: expense-tracker-backend
          image: REPLACE_ME/expense-tracker-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: expense-tracker-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            