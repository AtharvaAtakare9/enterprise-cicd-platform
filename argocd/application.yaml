apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: expense-tracker-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AtharvaAtakare9/enterprise-cicd-platform.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: expense-tracker-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        maxDuration: 1m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
